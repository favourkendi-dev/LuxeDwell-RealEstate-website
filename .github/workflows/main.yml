name: LuxeDwell Continuous Integration

on:
  push:
    branches: [ main ]  # Runs every time you push to the main branch
  pull_request:
    branches: [ main ]

jobs:
  test-logic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Jest Tests
        run: npm test